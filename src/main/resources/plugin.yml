name: WorkshopPractice
version: '0.0.1'
main: com.Qwikkspell.WorkshopPractice.WorkshopPractice
api-version: '1.20'
commands:
  play:
    description: Start a Workshop Practice run
    usage: /play <left|lefteasy|right|righteasy|timetrial60> OR /play allcrafts [left|lefteasy|right|righteasy] [seed <number>]
  playhelp:
    description: List all play commands, modes and seed syntax
    usage: /playhelp
  pregamecountdown:
    description: Set your personal pre-game countdown (0-10 seconds)
    usage: /pregamecountdown <seconds>
  l:
    description: Leave your current game and return to spawn (abandons the run)
    usage: /l
  leaderboard:
    description: Show a leaderboard for a mode, an item, or a special board
    usage: /leaderboard <left|lefteasy|right|righteasy|allcraftsleft|allcraftslefteasy|allcraftsright|allcraftsrighteasy|timetrial60|overall|setseed|totalgames|avgcraft|item <item>>
